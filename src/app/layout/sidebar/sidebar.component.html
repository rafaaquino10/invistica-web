<nav class="sidebar" [class.sidebar--expanded]="expanded()" aria-label="Navegação principal">
  <div class="sidebar__top">
    <a class="sidebar__logo" routerLink="/dashboard" aria-label="InvestIQ — Ir ao Dashboard">
      <span class="sidebar__logo-text">iQ</span>
      @if (expanded()) { <span class="sidebar__logo-name">InvestIQ</span> }
    </a>
    <button class="sidebar__toggle" (click)="toggle()" [attr.aria-label]="expanded() ? 'Recolher menu' : 'Expandir menu'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        @if (expanded()) {
          <polyline points="15 18 9 12 15 6"/>
        } @else {
          <polyline points="9 18 15 12 9 6"/>
        }
      </svg>
    </button>
  </div>

  <div class="sidebar__nav">
    @for (group of groups; track group.title) {
      <div class="sidebar__group">
        @if (expanded()) { <span class="sidebar__group-title">{{ group.title }}</span> }
        @for (item of group.items; track item.route) {
          <a class="sidebar__item"
             [routerLink]="item.route"
             routerLinkActive="sidebar__item--active"
             [title]="expanded() ? '' : item.label">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              @switch (item.icon) {
                @case ('grid') { <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/> }
                @case ('search') { <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/> }
                @case ('columns') { <path d="M12 3h7a2 2 0 012 2v14a2 2 0 01-2 2h-7m0-18H5a2 2 0 00-2 2v14a2 2 0 002 2h7m0-18v18"/> }
                @case ('map') { <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/> }
                @case ('thermometer') { <path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/> }
                @case ('briefcase') { <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/> }
                @case ('dollar') { <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/> }
                @case ('scale') { <path d="M12 3v18"/><path d="M5 8l7-5 7 5"/><path d="M2 15l3-7 3 7"/><path d="M16 15l3-7 3 7"/> }
                @case ('trending') { <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/> }
                @case ('sliders') { <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/> }
                @case ('rewind') { <polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/> }
                @case ('shield') { <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/> }
                @case ('building') { <rect x="4" y="2" width="16" height="20" rx="1"/><path d="M9 22V12h6v10"/> }
                @case ('radio') { <circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49"/> }
                @case ('activity') { <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/> }
                @case ('clock') { <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/> }
                @case ('bar-chart') { <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/> }
                @case ('settings') { <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/> }
              }
            </svg>
            @if (expanded()) { <span class="sidebar__label">{{ item.label }}</span> }
          </a>
        }
      </div>
    }
  </div>

  <div class="sidebar__bottom">
    <a class="sidebar__item"
       [routerLink]="settingsItem.route"
       routerLinkActive="sidebar__item--active"
       [title]="expanded() ? '' : settingsItem.label">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      @if (expanded()) { <span class="sidebar__label">{{ settingsItem.label }}</span> }
    </a>
  </div>
</nav>
