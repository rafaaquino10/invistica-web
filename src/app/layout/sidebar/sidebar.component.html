<nav class="sidebar" [class.collapsed]="sidebar.collapsed()">
  <!-- Toggle -->
  <button class="sidebar-toggle" (click)="sidebar.toggle()" aria-label="Toggle sidebar">
    <i class="ph ph-caret-left toggle-icon" [class.rotated]="sidebar.collapsed()"></i>
  </button>

  <!-- Top items (Dashboard) -->
  <div class="nav-section">
    @for (item of topItems; track item.route) {
      <a class="nav-item"
         [routerLink]="item.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }">
        <i class="ph ph-{{ item.icon }} nav-icon"
           routerLinkActive="ph-fill"
           [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </div>

  <!-- Groups -->
  @for (group of groups; track group.title) {
    <div class="nav-section">
      <span class="nav-group-title">{{ group.title }}</span>
      @for (item of group.items; track item.route) {
        <a class="nav-item"
           [routerLink]="item.route"
           routerLinkActive="active">
          <i class="ph ph-{{ item.icon }} nav-icon"
             routerLinkActive="ph-fill"></i>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </div>
  }
</nav>
