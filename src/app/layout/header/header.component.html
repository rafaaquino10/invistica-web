<header class="header glass">
  <!-- Left: Logo -->
  <a class="header-logo" routerLink="/dashboard">
    <iq-logo size="md" />
  </a>

  <!-- Center: Search -->
  <div class="header-search">
    <i class="ph ph-magnifying-glass search-icon"></i>
    <input
      type="text"
      class="search-input"
      placeholder="Buscar ticker ou empresa..."
      [value]="query()"
      (input)="onSearch($event)"
      (blur)="closeSearch()" />

    @if (showResults()) {
      <div class="search-results">
        @for (r of results(); track r.ticker) {
          <button class="search-result-item" (mousedown)="selectResult(r.ticker)">
            <span class="ticker mono">{{ r.ticker }}</span>
            <span class="result-name">{{ r.name }}</span>
          </button>
        }
      </div>
    }
  </div>

  <!-- Right: Actions -->
  <div class="header-actions">
    <!-- Theme toggle -->
    <button class="action-btn" (click)="theme.toggle()" aria-label="Toggle theme">
      @if (theme.theme() === 'dark') {
        <i class="ph ph-sun"></i>
      } @else {
        <i class="ph ph-moon"></i>
      }
    </button>

    @if (auth.isAuthenticated()) {
      <!-- Authenticated: Avatar + Menu -->
      <div class="avatar-wrapper">
        <button class="avatar-btn" (click)="toggleUserMenu()" (blur)="closeUserMenu()">
          @if (auth.userProfile().avatarUrl) {
            <img class="avatar-img" [src]="auth.userProfile().avatarUrl!" [alt]="auth.userProfile().name" />
          } @else {
            <span class="avatar-initials">{{ auth.userProfile().name.slice(0,2).toUpperCase() || 'U' }}</span>
          }
        </button>

        @if (showUserMenu()) {
          <div class="user-menu glass">
            <div class="menu-user-info">
              <span class="menu-user-name">{{ auth.userProfile().name }}</span>
              <span class="menu-user-email label">{{ auth.userProfile().email }}</span>
            </div>
            <div class="menu-divider"></div>
            <button class="menu-item" (mousedown)="showSettings.set(true); showUserMenu.set(false)">
              <i class="ph ph-gear"></i>
              <span>Configurações</span>
            </button>
            <div class="menu-divider"></div>
            <button class="menu-item menu-danger" (mousedown)="auth.logout(); showUserMenu.set(false)">
              <i class="ph ph-sign-out"></i>
              <span>Sair</span>
            </button>
          </div>
        }
      </div>
    } @else {
      <!-- Not authenticated: Login/Register buttons -->
      <a class="action-btn-text" routerLink="/entrar">Entrar</a>
      <a class="btn-volt-sm" routerLink="/criar-conta">Criar conta</a>
    }
  </div>
</header>

@if (showSettings()) {
  <iq-settings-modal (closed)="showSettings.set(false)" />
}
