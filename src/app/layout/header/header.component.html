<header class="header">
  <div class="header__search">
    <svg class="header__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="header__search-input"
           type="text"
           placeholder="Buscar ativo... (ex: PETR4)"
           readonly />
  </div>

  <div class="header__actions">
    @if (regime(); as r) {
      <span class="header__regime"
            [style.color]="r.color"
            [style.borderColor]="r.color"
            [style.backgroundColor]="r.color + '10'">
        {{ regimeLabel() }}
      </span>
    }

    <button class="header__btn" (click)="toggleTheme()" [title]="isDark() ? 'Light mode' : 'Dark mode'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        @if (isDark()) {
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        } @else {
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        }
      </svg>
    </button>

    <button class="header__btn header__bell" title="Notificações">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <span class="header__dot"></span>
    </button>

    <div class="header__avatar" title="Perfil">
      {{ userInitials() }}
    </div>
  </div>
</header>
