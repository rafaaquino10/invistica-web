<header class="header">
  <div class="header__search">
    <i class="ph ph-magnifying-glass" style="font-size: 16px; color: var(--text-tertiary)"></i>
    <input class="header__search-input"
           type="text"
           placeholder="Buscar ativo... (ex: PETR4)"
           readonly />
  </div>

  <div class="header__actions">
    <button class="header__btn" (click)="toggleTheme()" [title]="isDark() ? 'Light mode' : 'Dark mode'">
      <i [class]="isDark() ? 'ph ph-sun' : 'ph ph-moon'" style="font-size: 18px"></i>
    </button>

    <button class="header__btn header__bell" title="Notificacoes">
      <i class="ph ph-bell" style="font-size: 18px"></i>
      <span class="header__dot"></span>
    </button>

    <!-- AVATAR + DROPDOWN -->
    <div class="header__avatar-wrap" (iqClickOutside)="menuOpen.set(false)">
      <button class="header__avatar" (click)="toggleMenu()">
        {{ userInitials() }}
      </button>
      @if (menuOpen()) {
        <div class="header__menu">
          <div class="header__menu-user">
            <span class="header__menu-name">{{ userName() }}</span>
            <span class="header__menu-email">{{ userEmail() }}</span>
          </div>
          <a class="header__menu-item" routerLink="/configuracoes" (click)="menuOpen.set(false)">
            <i class="ph ph-gear" style="font-size: 16px"></i>
            Configuracoes
          </a>
          <button class="header__menu-item header__menu-item--danger" (click)="logout()">
            <i class="ph ph-sign-out" style="font-size: 16px"></i>
            Sair
          </button>
        </div>
      }
    </div>
  </div>
</header>
