@if (loading()) {
  <div class="dash">
    <iq-skeleton variant="rect" width="100%" height="200px" />
    <iq-skeleton variant="rect" width="100%" height="100px" />
    <div class="dash__skeleton-row">
      <iq-skeleton variant="rect" width="100%" height="200px" />
      <iq-skeleton variant="rect" width="100%" height="200px" />
      <iq-skeleton variant="rect" width="100%" height="200px" />
    </div>
  </div>
} @else {
  <div class="dash">
    <!-- SEÇÃO 1: HERO BANNER -->
    @if (hasPortfolio()) {
      <dash-hero
        [userName]="userName()"
        [score]="portfolioScore()"
        [rating]="portfolioRating()"
        [totalValue]="portfolio()!.total_value"
        [plToday]="0"
        [plTotal]="portfolio()!.total_gain_loss"
        [plTotalPct]="portfolio()!.total_gain_loss_pct"
        [dividends12m]="divTotal()"
        [yieldOnCost]="divYield()"
        [regimeType]="regimeType()"
        [selic]="selic()"
        [ipca]="ipca()" />
    } @else {
      <section class="dash__empty-hero">
        <div class="dash__empty-hero-content">
          <h1 class="dash__empty-hero-title">{{ userName() ? 'Olá, ' + userName() + '.' : 'Bem-vindo ao InvestIQ.' }}</h1>
          <p class="dash__empty-hero-desc">Adicione suas posições para ver seu briefing personalizado.</p>
          <iq-button variant="primary" routerLink="/carteira" [queryParams]="{ add: true }">Adicionar primeira posição</iq-button>
        </div>
      </section>
    }

    <!-- SEÇÃO 2: IBOV INTRADAY -->
    <dash-ibov />

    <!-- SEÇÃO 3: ALTAS + BAIXAS + EXPOSIÇÃO -->
    <dash-movers
      [gainers]="gainers()"
      [losers]="losers()"
      [sectors]="sectorExposure()"
      [hhi]="0" />

    <!-- SEÇÃO 4: INSIGHTS + COLUNA DIREITA -->
    <dash-insights
      [cards]="insightCards()"
      [recommended]="recommended()"
      [dividends]="[]" />

    <iq-disclaimer />
  </div>
}
