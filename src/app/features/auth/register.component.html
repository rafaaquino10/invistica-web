<div class="auth">
  <div class="auth__card">
    <div class="auth__logo">
      <span class="auth__logo-text mono">iQ</span>
    </div>
    <h1 class="auth__title">Criar Conta</h1>

    @if (error()) {
      <div class="auth__error">{{ error() }}</div>
    }

    <div class="auth__form">
      <div class="auth__field">
        <label class="auth__label">Nome</label>
        <input class="auth__input" type="text" placeholder="Seu nome"
               [ngModel]="name()" (ngModelChange)="name.set($event)" />
      </div>
      <div class="auth__field">
        <label class="auth__label">E-mail</label>
        <input class="auth__input" type="email" placeholder="seu@email.com"
               [ngModel]="email()" (ngModelChange)="email.set($event)" />
      </div>
      <div class="auth__field">
        <label class="auth__label">Senha</label>
        <input class="auth__input" type="password" placeholder="Mínimo 6 caracteres"
               [ngModel]="password()" (ngModelChange)="password.set($event)" />
      </div>
      <div class="auth__field">
        <label class="auth__label">Confirmar Senha</label>
        <input class="auth__input" type="password" placeholder="Repita a senha"
               [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)"
               (keydown.enter)="register()" />
      </div>
      <iq-button variant="primary" [loading]="loading()" (clicked)="register()">Criar Conta</iq-button>
    </div>

    <div class="auth__divider">
      <span>ou</span>
    </div>

    <button class="auth__google" (click)="registerWithGoogle()">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Criar conta com Google
    </button>

    <p class="auth__footer">
      Já tem conta? <a routerLink="/login" class="auth__link">Entrar</a>
    </p>
  </div>
</div>
